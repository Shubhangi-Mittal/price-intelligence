name: Weekly Data Refresh

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6:00 AM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Generate fresh mock data
        run: python ingestion/mock_feed_generator.py --days 90 --records 400

      - name: Build dashboard data.json
        run: python scripts/build_dashboard_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json mock_data/all_listings.csv mock_data/metadata.json
          git diff --staged --quiet || git commit -m "chore: weekly data refresh $(date -u +%Y-%m-%d)"
          git push
